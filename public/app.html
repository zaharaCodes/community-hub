<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Hub — Browse Resources</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --bg:#0E0E0E;--bg2:#161616;--bg3:#1E1E1E;--card:#1A1A1A;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#F0EDE8;--muted:#888;--amber:#F5A623;--amber2:#FFD07A;
  --green:#4ADE80;--blue:#60A5FA;--coral:#FF6B6B;--purple:#A78BFA;
  --grad:linear-gradient(135deg,#F5A623 0%,#FF6B6B 100%);
  --sidebar:256px;--nav:60px;
}
body.light{
  --bg:#F5F4F0;--bg2:#ECEAE4;--bg3:#E2DED6;--card:#FFFFFF;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1A1714;--muted:#6B6660;
}
body.light .nav-username{color:#1A1714}
body.light .navbar{background:rgba(245,244,240,0.95)}
body.light .nav-btn-ghost{color:#6B6660;border-color:rgba(0,0,0,0.12)}
body.light .nav-btn-ghost:hover{color:#1A1714}
body.light .sidebar{background:#ECEAE4;border-color:rgba(0,0,0,0.08)}
body.light .sidebar-item:hover{background:rgba(0,0,0,0.04)}
body.light .sidebar-item.active{background:rgba(245,166,35,0.12)}
body.light .sort-select{background:#ECEAE4;color:#1A1714}
body.light .form-input{background:#ECEAE4;color:#1A1714}
body.light .form-select{background:#ECEAE4;color:#1A1714}
body.light .form-textarea{background:#ECEAE4;color:#1A1714}
body.light .modal{background:#FFFFFF}
body.light .res-action-btn{background:#ECEAE4}
body.light .search-bar{background:#ECEAE4}
.theme-toggle{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg2);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;
}
.theme-toggle:hover{border-color:var(--border2);transform:scale(1.08)}
.theme-toggle svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:1.6;stroke-linecap:round}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,14,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-left{display:flex;align-items:center;gap:0.7rem}
.nav-logo{display:flex;align-items:center;gap:0.6rem;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:800;color:var(--text);text-decoration:none}
.nav-logo-icon{width:30px;height:30px;border-radius:7px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:900;color:#fff;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:0.5rem}
.nav-btn-ghost{background:transparent;color:var(--muted);padding:0.36rem 0.8rem;border-radius:7px;font-weight:600;font-size:0.8rem;font-family:'Outfit',sans-serif;text-decoration:none;border:1px solid var(--border);transition:all 0.2s;cursor:pointer;white-space:nowrap}
.nav-btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.nav-btn-primary{background:var(--grad);color:#fff;padding:0.36rem 0.9rem;border-radius:7px;font-weight:700;font-size:0.8rem;font-family:'Outfit',sans-serif;text-decoration:none;border:none;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.nav-btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.nav-user{display:none;align-items:center;gap:0.5rem}
.nav-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.68rem;color:#fff;border:2px solid var(--border2)}
.nav-username{font-size:0.8rem;font-weight:600;white-space:nowrap}
.hamburger{display:none;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer;padding:4px;flex-shrink:0}
.hamburger span{display:block;width:18px;height:2px;background:var(--text);border-radius:2px}

/* LAYOUT */
.page-shell{display:flex;padding-top:var(--nav);min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  position:fixed;top:var(--nav);left:0;bottom:0;
  background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;padding:1rem 0.75rem;
  display:flex;flex-direction:column;gap:0.1rem;z-index:500;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.sidebar-add-btn{display:flex;align-items:center;justify-content:center;gap:0.5rem;width:100%;padding:0.62rem;border-radius:9px;background:var(--grad);color:#fff;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;transition:all 0.2s;margin-bottom:0.4rem;white-space:nowrap}
.sidebar-add-btn:hover{opacity:0.9;transform:translateY(-1px)}
.sidebar-add-btn svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.sidebar-section{font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding:0.45rem 0.55rem 0.22rem;margin-top:0.35rem}
.sidebar-item{display:flex;align-items:center;gap:0.55rem;padding:0.52rem 0.65rem;border-radius:8px;color:var(--muted);font-size:0.83rem;font-weight:500;cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:'Outfit',sans-serif;white-space:nowrap}
.sidebar-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.sidebar-item.active{color:var(--text);background:rgba(245,166,35,0.1)}
.sidebar-item.active .si-icon svg{stroke:var(--amber)}
.si-icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.si-icon svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.15s}
.sidebar-item:hover .si-icon svg{stroke:var(--text)}
.si-count{margin-left:auto;flex-shrink:0;background:rgba(255,255,255,0.06);color:var(--muted);font-size:0.64rem;font-weight:700;padding:0.08rem 0.4rem;border-radius:100px}

/* MAIN */
.main-content{flex:1;min-width:0;margin-left:var(--sidebar);width:calc(100% - var(--sidebar));padding:1.75rem 2rem;overflow-x:hidden}

/* PAGE HEADER */
.page-header{margin-bottom:1.5rem}
.page-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;line-height:1.2;margin-bottom:0.22rem;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.page-sub{color:var(--muted);font-size:0.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SEARCH */
.search-bar{display:flex;align-items:center;gap:0.65rem;background:var(--bg2);border:1px solid var(--border2);border-radius:11px;padding:0.62rem 0.9rem;margin-bottom:0.85rem;transition:border-color 0.2s;width:100%}
.search-bar:focus-within{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,166,35,0.07)}
.search-bar input{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--text);font-size:0.88rem;font-family:'Outfit',sans-serif}
.search-bar input::placeholder{color:var(--muted)}
.search-icon svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round}

/* FILTER ROW */
.filter-row{display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;gap:0.32rem;margin-bottom:1.5rem;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-ms-overflow-style:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:0.35rem;padding:0.28rem 0.75rem;border-radius:100px;font-size:0.73rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;transition:all 0.15s;white-space:nowrap}
.filter-chip svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.filter-chip:hover{border-color:var(--border2);color:var(--text)}
.filter-chip.active{background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.36);color:var(--amber)}
.sort-select{flex-shrink:0;margin-left:auto;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:0.28rem 0.62rem;border-radius:7px;font-size:0.73rem;font-family:'Outfit',sans-serif;outline:none;cursor:pointer}

/* GRID */
.resource-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:1rem;width:100%}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;transition:all 0.2s;position:relative;overflow:hidden;animation:fadeUp 0.3s ease both;min-width:0}
.res-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--grad);transform:scaleX(0);transform-origin:left;transition:transform 0.24s}
.res-card:hover{border-color:rgba(245,166,35,0.2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,0.26)}
.res-card:hover::after{transform:scaleX(1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.res-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.48rem;gap:0.45rem}
.res-name{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;min-width:0}
.res-cat{padding:0.15rem 0.52rem;border-radius:100px;font-size:0.58rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.cat-food{background:rgba(74,222,128,0.12);color:#4ade80}
.cat-shelter{background:rgba(245,166,35,0.12);color:#f5a623}
.cat-health{background:rgba(255,107,107,0.12);color:#ff6b6b}
.cat-mental{background:rgba(167,139,250,0.12);color:#a78bfa}
.cat-job{background:rgba(96,165,250,0.12);color:#60a5fa}
.cat-education{background:rgba(52,211,153,0.12);color:#34d399}
.cat-legal{background:rgba(251,146,60,0.12);color:#fb923c}
.cat-other{background:rgba(136,136,136,0.12);color:#888}
.res-loc{display:flex;align-items:center;gap:0.3rem;color:var(--muted);font-size:0.76rem;margin-bottom:0.48rem}
.res-loc svg{width:11px;height:11px;stroke:var(--muted);fill:none;stroke-width:1.8;flex-shrink:0}
.res-desc{color:var(--muted);font-size:0.81rem;line-height:1.52;margin-bottom:0.75rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.res-tags{display:flex;gap:0.28rem;flex-wrap:wrap;margin-bottom:0.75rem}
.res-tag{background:rgba(245,166,35,0.07);border:1px solid rgba(245,166,35,0.16);color:var(--amber);font-size:0.58rem;font-weight:600;padding:0.09rem 0.4rem;border-radius:100px}
.res-footer{display:flex;justify-content:space-between;align-items:center}
.res-helpful{display:flex;align-items:center;gap:0.3rem;color:var(--muted);font-size:0.74rem}
.res-helpful svg{width:12px;height:12px;stroke:var(--muted);fill:none;stroke-width:1.6;flex-shrink:0}
.res-actions{display:flex;gap:0.26rem}
.res-action-btn{width:26px;height:26px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;color:var(--muted);text-decoration:none}
.res-action-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.res-action-btn:hover{border-color:var(--amber);color:var(--amber)}
.res-action-btn.voted{background:rgba(245,166,35,0.09);border-color:var(--amber);color:var(--amber)}
.res-action-btn.voted svg{stroke:var(--amber)}

/* AUTOCOMPLETE */
.search-wrap{position:relative;width:100%}
.autocomplete-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:200;background:var(--card);border:1px solid var(--border2);border-radius:12px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,0.35);display:none}
.autocomplete-dropdown.open{display:block;animation:fadeUp 0.15s ease both}
.ac-item{display:flex;align-items:center;gap:0.65rem;padding:0.7rem 1rem;cursor:pointer;transition:background 0.15s;font-size:0.88rem}
.ac-item:hover,.ac-item.focused{background:rgba(245,166,35,0.08)}
.ac-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ac-icon svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.ac-label{font-weight:600;flex:1}
.ac-type{font-size:0.72rem;color:var(--muted);font-weight:500}

/* NEAR ME */
.near-me-btn{display:flex;align-items:center;gap:0.4rem;padding:0.28rem 0.75rem;border-radius:100px;font-size:0.73rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.near-me-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;flex-shrink:0}
.near-me-btn:hover{border-color:var(--blue);color:var(--blue)}
.near-me-btn.active{background:rgba(96,165,250,0.1);border-color:rgba(96,165,250,0.4);color:var(--blue)}
.near-me-btn.loading{opacity:0.7;cursor:wait}

/* STATES */
.state-box{grid-column:1/-1;text-align:center;padding:3rem 2rem;color:var(--muted)}
.state-icon{margin-bottom:0.7rem;display:flex;justify-content:center}
.state-icon svg{width:36px;height:36px;stroke:var(--muted);fill:none;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round;opacity:0.5}
.state-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:0.32rem}
.state-sub{font-size:0.85rem}
.skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;animation:shimmer 1.4s ease-in-out infinite}
.skel{background:var(--bg3);border-radius:5px;margin-bottom:0.55rem}
@keyframes shimmer{0%,100%{opacity:0.45}50%{opacity:0.85}}

/* DASHBOARD */
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0.9rem;margin-bottom:1.5rem}
.dash-stat-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:1.15rem}
.dash-stat-num{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:800;line-height:1}
.dash-stat-lbl{color:var(--muted);font-size:0.76rem;margin-top:0.22rem}
.dash-section-title{font-weight:700;font-size:0.95rem;margin-bottom:0.9rem}

/* AUTH REQUIRED */
.auth-required{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:2.25rem;text-align:center;max-width:360px}
.auth-req-icon{display:flex;justify-content:center;margin-bottom:0.8rem}
.auth-req-icon svg{width:32px;height:32px;stroke:var(--muted);fill:none;stroke-width:1.4;opacity:0.6}
.auth-req-title{font-family:'Playfair Display',serif;font-size:1.28rem;font-weight:800;margin-bottom:0.38rem}
.auth-req-sub{color:var(--muted);font-size:0.86rem;margin-bottom:1.3rem;line-height:1.6}
.auth-req-btn{display:inline-block;background:var(--grad);color:#fff;padding:0.65rem 1.4rem;border-radius:9px;font-family:'Outfit',sans-serif;font-weight:700;font-size:0.88rem;text-decoration:none;transition:all 0.2s}
.auth-req-btn:hover{opacity:0.9;transform:translateY(-1px)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.78);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.26s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:1.85rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;transform:translateY(18px);transition:transform 0.26s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.3rem}
.modal-title{font-family:'Playfair Display',serif;font-size:1.38rem;font-weight:800}
.modal-close{width:28px;height:28px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.modal-close:hover{color:var(--text);border-color:var(--border2)}
.modal-close svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.form-group{margin-bottom:0.9rem}
.form-label{display:block;font-size:0.71rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:0.36rem}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:0.7rem 0.85rem;border-radius:9px;font-size:0.88rem;font-family:'Outfit',sans-serif;outline:none;transition:all 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,166,35,0.07)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted)}
.form-textarea{resize:vertical;min-height:82px}
.form-select option{background:var(--card)}
.form-alert{padding:0.7rem 0.85rem;border-radius:8px;font-size:0.81rem;display:none;align-items:center;gap:0.4rem;margin-bottom:0.85rem}
.form-alert.show{display:flex}
.form-alert.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.25);color:var(--coral)}
.modal-actions{display:flex;gap:0.6rem;margin-top:1.3rem}
.btn-cancel{flex:1;padding:0.7rem;border-radius:9px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-weight:600;font-size:0.86rem;cursor:pointer;transition:all 0.2s}
.btn-cancel:hover{color:var(--text);border-color:var(--border2)}
.btn-save{flex:2;padding:0.7rem;border-radius:9px;background:var(--grad);color:#fff;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:0.86rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.4rem}
.btn-save:hover:not(:disabled){opacity:0.9;transform:translateY(-1px)}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}

/* TOAST */
.toast-container{position:fixed;bottom:1.4rem;right:1.4rem;z-index:3000;display:flex;flex-direction:column;gap:0.45rem;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:0.65rem 0.95rem;font-size:0.81rem;font-weight:600;display:flex;align-items:center;gap:0.45rem;animation:toastIn 0.28s cubic-bezier(0.4,0,0.2,1) both;max-width:270px;pointer-events:all}
.toast svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.toast.success{border-color:rgba(74,222,128,0.3);color:var(--green)}
.toast.error{border-color:rgba(255,107,107,0.3);color:var(--coral)}
.toast.info{border-color:rgba(96,165,250,0.3);color:var(--blue)}
@keyframes toastIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}

/* MOBILE OVERLAY */
.mob-overlay{display:none;position:fixed;inset:0;z-index:490;background:rgba(0,0,0,0.55)}
.mob-overlay.open{display:block}

/* RESPONSIVE */
@media(max-width:820px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0;width:100%;padding:1.25rem 1rem}
  .hamburger{display:flex}
  .dash-stats{grid-template-columns:1fr 1fr}
  .page-title{font-size:1.5rem}
}
@media(max-width:480px){
  .dash-stats{grid-template-columns:1fr}
  .resource-grid{grid-template-columns:1fr}
  .main-content{padding:1rem 0.85rem}
}
</style>
</head>
<body>

<!-- SVG ICON DEFS (reusable symbols) -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- search -->

  <!-- grid / all -->

<script>
/* ── API BASE ── */
var API = 'https://community-hub-production-5633.up.railway.app';
var S={user:null,token:null,resources:[],filtered:[],bookmarks:[],voted:[],activeCat:'all',sort:'newest',search:'',editId:null,nearMe:false};
var CAT_LABEL={food:'Food',shelter:'Shelter',health:'Healthcare',mental:'Mental Health',job:'Job Training',education:'Education',legal:'Legal Aid',other:'Other'};
var TITLE_MAP={all:'All Resources',food:'Food Assistance',shelter:'Shelter',health:'Healthcare',mental:'Mental Health',job:'Job Training',education:'Education',legal:'Legal Aid',other:'Other'};

/* ── SVG HELPERS (inline icons for JS-rendered cards) ── */
var IC = {
  pin:  '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><use href="#ic-pin"/></svg>',
  thumb:'<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-thumb"/></svg>',
  eye:  '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><use href="#ic-eye"/></svg>',
  edit: '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><use href="#ic-edit"/></svg>',
  trash:'<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><use href="#ic-trash"/></svg>',
  bm:   '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><use href="#ic-bookmark"/></svg>',
  link: '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><use href="#ic-link"/></svg>',
  check:'<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><use href="#ic-check"/></svg>',
  alert:'<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><use href="#ic-alert"/></svg>',
  info: '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><use href="#ic-nearme"/></svg>',
  lock: '<svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><use href="#ic-lock"/></svg>',
  empty:'<svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-empty"/></svg>',
  warn: '<svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-warning"/></svg>',
  srch: '<svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><use href="#ic-search"/></svg>',
};

function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function authHeaders(){var h={'Content-Type':'application/json'};if(S.token)h['Authorization']='Bearer '+S.token;return h}

function toast(msg, type) {
  var iconMap = {success: IC.check, error: IC.alert, info: IC.info};
  var t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.innerHTML = (iconMap[type] || IC.info) + '<span>' + esc(msg) + '</span>';
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(function(){t.style.transition='all 0.28s';t.style.opacity='0';t.style.transform='translateX(14px)';setTimeout(function(){t.remove()},280)},3000);
}

/* AUTH */
function initAuth(){
  S.token=localStorage.getItem('ch_token');
  try{S.user=JSON.parse(localStorage.getItem('ch_user'))}catch(e){S.user=null}
  try{S.bookmarks=JSON.parse(localStorage.getItem('ch_bookmarks'))||[]}catch(e){S.bookmarks=[]}
  try{S.voted=JSON.parse(localStorage.getItem('ch_voted'))||[]}catch(e){S.voted=[]}
  renderNav();
  if(S.token){
    fetch(API+'/api/auth/me',{headers:authHeaders()})
      .then(function(r){if(!r.ok)throw new Error();return r.json()})
      .then(function(d){S.user=d.user;localStorage.setItem('ch_user',JSON.stringify(d.user));renderNav()})
      .catch(function(){S.token=null;S.user=null;localStorage.removeItem('ch_token');localStorage.removeItem('ch_user');renderNav()});
  }
}

function renderNav(){
  var g=document.getElementById('guestNav'),u=document.getElementById('userNav');
  if(S.user){
    g.style.display='none';u.style.display='flex';
    var av=document.getElementById('navAvatar');
    av.textContent=(S.user.avatar&&S.user.avatar.initials)?S.user.avatar.initials:(S.user.name?S.user.name[0].toUpperCase():'?');
    av.style.background=(S.user.avatar&&S.user.avatar.color)?S.user.avatar.color:'#F5A623';
    document.getElementById('navUsername').textContent=S.user.name?S.user.name.split(' ')[0]:S.user.email;
    var adminSection=document.getElementById('adminSidebarSection');
    var adminNavBtn=document.getElementById('adminNavBtn');
    if(S.user.role==='admin'){adminSection.style.display='block';if(adminNavBtn)adminNavBtn.style.display='flex'}
    else{adminSection.style.display='none';if(adminNavBtn)adminNavBtn.style.display='none'}
  }else{
    g.style.display='flex';u.style.display='none';
    var adminSection=document.getElementById('adminSidebarSection');
    if(adminSection)adminSection.style.display='none';
    var adminNavBtn=document.getElementById('adminNavBtn');
    if(adminNavBtn)adminNavBtn.style.display='none';
  }
}

document.getElementById('logoutBtn').addEventListener('click',function(){
  localStorage.removeItem('ch_token');localStorage.removeItem('ch_user');
  S.token=null;S.user=null;renderNav();showView('resources');toast('Signed out','info');
});

/* MOBILE SIDEBAR */
var sidebar=document.getElementById('sidebar'),mobOverlay=document.getElementById('mobOverlay');
document.getElementById('hamburger').addEventListener('click',function(){sidebar.classList.toggle('open');mobOverlay.classList.toggle('open')});
mobOverlay.addEventListener('click',function(){sidebar.classList.remove('open');mobOverlay.classList.remove('open')});
function closeSidebar(){sidebar.classList.remove('open');mobOverlay.classList.remove('open')}

/* VIEWS */
function showView(view){
  document.getElementById('resourcesView').style.display=view==='resources'?'block':'none';
  document.getElementById('dashboardView').style.display=view==='dashboard'?'block':'none';
  document.getElementById('bookmarksView').style.display=view==='bookmarks'?'block':'none';
  document.querySelectorAll('.sidebar-item').forEach(function(el){
    el.classList.toggle('active',el.dataset.view===view&&(view!=='resources'||el.dataset.cat===S.activeCat));
  });
  if(view==='dashboard')renderDashboard();
  if(view==='bookmarks')renderBookmarks();
}

/* LOAD */
function loadResources(){
  fetch(API+'/api/resources')
    .then(function(r){return r.json()})
    .then(function(data){
      S.resources=Array.isArray(data)?data:[];
      document.getElementById('allCount').textContent=S.resources.length;
      applyFilters();
    })
    .catch(function(){
      document.getElementById('resourceGrid').innerHTML='<div class="state-box"><div class="state-icon">'+IC.warn+'</div><div class="state-title">Could not load resources</div><div class="state-sub">Make sure your server is running.</div></div>';
    });
}

function applyFilters(){
  var q=S.search.toLowerCase(),cat=S.activeCat;
  var base = S.nearMe
    ? S.resources.filter(function(r){ return r.location && r.location.toLowerCase().includes(S.nearMe.toLowerCase()); })
    : S.resources;
  S.filtered=base.filter(function(r){
    var mc=cat==='all'||r.category===cat;
    var mq=!q||(r.name&&r.name.toLowerCase().includes(q))||(r.description&&r.description.toLowerCase().includes(q))||(r.location&&r.location.toLowerCase().includes(q))||(r.tags&&r.tags.some(function(t){return t.toLowerCase().includes(q)}));
    return mc&&mq;
  });
  if(S.sort==='helpful')S.filtered.sort(function(a,b){return(b.helpful||0)-(a.helpful||0)});
  else if(S.sort==='az')S.filtered.sort(function(a,b){return(a.name||'').localeCompare(b.name||'')});
  else S.filtered.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)});
  renderGrid();
}

function renderGrid(){
  var grid=document.getElementById('resourceGrid');
  if(!S.filtered.length){
    grid.innerHTML='<div class="state-box"><div class="state-icon">'+IC.srch+'</div><div class="state-title">No resources found</div><div class="state-sub">Try a different search or be the first to add one!</div></div>';
    return;
  }
  grid.innerHTML=S.filtered.map(function(r,i){
    var tags=(r.tags||[]).slice(0,3).map(function(t){return'<span class="res-tag">'+esc(t)+'</span>'}).join('');
    var voted=S.voted.indexOf(r._id)>-1,bm=S.bookmarks.indexOf(r._id)>-1;
    var canEdit=S.user&&(S.user.role==='admin'||String(S.user._id)===String(r.submittedBy));
    return'<div class="res-card" style="animation-delay:'+(i*0.032)+'s">'
      +'<div class="res-top">'
      +'<a class="res-name" href="resource.html?id='+esc(r._id)+'" style="text-decoration:none;color:inherit;display:block" title="View details">'+esc(r.name)+'</a>'
      +'<span class="res-cat cat-'+esc(r.category)+'">'+(CAT_LABEL[r.category]||esc(r.category))+'</span></div>'
      +'<div class="res-loc">'+IC.pin+' '+esc(r.location)+'</div>'
      +(r.description?'<div class="res-desc" onclick="window.location.href=\'resource.html?id='+esc(r._id)+'\'" style="cursor:pointer">'+esc(r.description)+'</div>':'')
      +(tags?'<div class="res-tags">'+tags+'</div>':'')
      +'<div class="res-footer">'
      +'<div class="res-helpful">'+IC.thumb+' '+(r.helpful||0)+' helpful</div>'
      +'<div class="res-actions">'
      +'<button class="res-action-btn'+(voted?' voted':'')+'" title="'+(voted?'Remove vote':'Mark helpful')+'" onclick="voteHelpful(\''+esc(r._id)+'\')">'+IC.thumb+'</button>'
      +'<button class="res-action-btn'+(bm?' voted':'')+'" title="'+(bm?'Remove bookmark':'Bookmark')+'" onclick="toggleBookmark(\''+esc(r._id)+'\')">'+IC.bm+'</button>'
      +'<a class="res-action-btn" title="View details" href="resource.html?id='+esc(r._id)+'">'+IC.eye+'</a>'
      +(canEdit?'<button class="res-action-btn" title="Edit" onclick="openEditModal(\''+esc(r._id)+'\')">'+IC.edit+'</button>':'')
      +(canEdit?'<button class="res-action-btn" title="Delete" onclick="deleteResource(\''+esc(r._id)+'\')">'+IC.trash+'</button>':'')
      +'</div></div></div>';
  }).join('');
}

/* VOTE / BOOKMARK */
function voteHelpful(id){
  var idx=S.voted.indexOf(id);var isVoted=idx>-1;
  var endpoint=API+'/api/resources/'+id+'/'+(isVoted?'unhelpful':'helpful');
  fetch(endpoint,{method:'POST',headers:authHeaders()})
    .then(function(r){if(!r.ok)throw new Error('status '+r.status);return r.json()})
    .then(function(d){
      var res=S.resources.find(function(x){return x._id===id});
      if(res&&d.helpful!==undefined)res.helpful=d.helpful;
      if(isVoted){S.voted.splice(idx,1);toast('Vote removed','info')}
      else{S.voted.push(id);toast('Marked as helpful','success')}
      localStorage.setItem('ch_voted',JSON.stringify(S.voted));applyFilters();
    })
    .catch(function(){toast('Could not vote — is the server running?','error')});
}
function toggleBookmark(id){
  var idx=S.bookmarks.indexOf(id);
  if(idx>-1){S.bookmarks.splice(idx,1);toast('Bookmark removed','info')}
  else{S.bookmarks.push(id);toast('Bookmarked','success')}
  localStorage.setItem('ch_bookmarks',JSON.stringify(S.bookmarks));applyFilters();
}

/* MODAL */
function openModal(editId){
  S.editId=editId||null;
  document.getElementById('modalTitle').textContent=editId?'Edit Resource':'Share a Resource';
  document.getElementById('saveBtnText').textContent=editId?'Save Changes':'Share Resource';
  document.getElementById('editId').value=editId||'';
  document.getElementById('modalAlert').className='form-alert error';
  if(editId){
    var r=S.resources.find(function(x){return x._id===editId});
    if(r){document.getElementById('fName').value=r.name||'';document.getElementById('fCategory').value=r.category||'';document.getElementById('fLocation').value=r.location||'';document.getElementById('fDescription').value=r.description||'';document.getElementById('fContact').value=r.contact||'';document.getElementById('fTags').value=(r.tags||[]).join(', ');}
  }else{
    ['fName','fCategory','fLocation','fDescription','fContact','fTags'].forEach(function(id){document.getElementById(id).value=''});
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function openEditModal(id){if(!S.user){window.location.href='auth.html';return}openModal(id)}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
document.getElementById('closeModal').addEventListener('click',closeModal);
document.getElementById('cancelModal').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('openAddModal').addEventListener('click',function(){
  closeSidebar();
  if(!S.user){toast('Please sign in to share a resource','info');setTimeout(function(){window.location.href='auth.html'},1200);return}
  openModal(null);
});
document.getElementById('saveResource').addEventListener('click',function(){
  var name=document.getElementById('fName').value.trim();
  var cat=document.getElementById('fCategory').value;
  var loc=document.getElementById('fLocation').value.trim();
  var desc=document.getElementById('fDescription').value.trim();
  var contact=document.getElementById('fContact').value.trim();
  var tags=document.getElementById('fTags').value.split(',').map(function(t){return t.trim()}).filter(Boolean);
  var alertEl=document.getElementById('modalAlert');
  if(!name||!cat||!loc||!desc){alertEl.textContent='Please fill in all required fields.';alertEl.className='form-alert error show';return}
  var btn=this;btn.disabled=true;document.getElementById('saveBtnText').textContent='Saving...';
  var editId=document.getElementById('editId').value;
  var body={name:name,category:cat,location:loc,description:desc,contact:contact,tags:tags};
  if(!editId&&S.user)body.submittedBy=S.user._id;
  fetch(editId?API+'/api/resources/'+editId:API+'/api/resources',{method:editId?'PUT':'POST',headers:authHeaders(),body:JSON.stringify(body)})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}})})
    .then(function(res){
      btn.disabled=false;document.getElementById('saveBtnText').textContent=editId?'Save Changes':'Share Resource';
      if(!res.ok){alertEl.textContent=res.data.error||'Something went wrong.';alertEl.className='form-alert error show';return}
      closeModal();toast(editId?'Resource updated':'Resource shared','success');loadResources();
    })
    .catch(function(){btn.disabled=false;document.getElementById('saveBtnText').textContent=editId?'Save Changes':'Share Resource';alertEl.textContent='Network error — is the server running?';alertEl.className='form-alert error show'});
});

/* DELETE */
function deleteResource(id){
  if(!confirm('Delete this resource? This cannot be undone.'))return;
  fetch(API+'/api/resources/'+id,{method:'DELETE',headers:authHeaders()})
    .then(function(r){return r.json()})
    .then(function(){toast('Resource deleted','info');loadResources()})
    .catch(function(){toast('Could not delete','error')});
}

/* DASHBOARD */
function renderDashboard(){
  var el=document.getElementById('dashContent');
  if(!S.user){
    el.innerHTML='<div class="auth-required"><div class="auth-req-icon">'+IC.lock+'</div><div class="auth-req-title">Sign in to view your dashboard</div><div class="auth-req-sub">Track your contributions and see your community impact.</div><a href="auth.html" class="auth-req-btn">Sign In or Register</a></div>';
    return;
  }
  var myRes=S.resources.filter(function(r){return String(r.submittedBy)===String(S.user._id)});
  var totalVotes=myRes.reduce(function(s,r){return s+(r.helpful||0)},0);
  el.innerHTML='<div class="dash-stats">'
    +'<div class="dash-stat-card"><div class="dash-stat-num" style="color:var(--amber)">'+myRes.length+'</div><div class="dash-stat-lbl">Resources Shared</div></div>'
    +'<div class="dash-stat-card"><div class="dash-stat-num" style="color:var(--green)">'+totalVotes+'</div><div class="dash-stat-lbl">Helpful Votes</div></div>'
    +'<div class="dash-stat-card"><div class="dash-stat-num" style="color:var(--blue)">'+S.bookmarks.length+'</div><div class="dash-stat-lbl">Bookmarks</div></div>'
    +'</div><div class="dash-section-title">My Submissions</div><div class="resource-grid">'
    +(myRes.length?myRes.map(function(r,i){
      return'<div class="res-card" style="animation-delay:'+(i*0.04)+'s">'
        +'<div class="res-top"><div class="res-name">'+esc(r.name)+'</div><span class="res-cat cat-'+esc(r.category)+'">'+(CAT_LABEL[r.category]||esc(r.category))+'</span></div>'
        +'<div class="res-loc">'+IC.pin+' '+esc(r.location)+'</div>'
        +'<div class="res-desc">'+esc(r.description)+'</div>'
        +'<div class="res-footer"><div class="res-helpful">'+IC.thumb+' '+(r.helpful||0)+' helpful</div>'
        +'<div class="res-actions"><button class="res-action-btn" onclick="openEditModal(\''+esc(r._id)+'\')">'+IC.edit+'</button><button class="res-action-btn" onclick="deleteResource(\''+esc(r._id)+'\')">'+IC.trash+'</button></div></div></div>';
    }).join(''):'<div class="state-box"><div class="state-icon">'+IC.empty+'</div><div class="state-title">No submissions yet</div><div class="state-sub">Click "+ Share a Resource" to add your first one.</div></div>')
    +'</div>';
}

/* BOOKMARKS */
function renderBookmarks(){
  var grid=document.getElementById('bookmarksGrid');
  var bm=S.resources.filter(function(r){return S.bookmarks.indexOf(r._id)>-1});
  if(!bm.length){grid.innerHTML='<div class="state-box"><div class="state-icon">'+IC.bm+'</div><div class="state-title">No bookmarks yet</div><div class="state-sub">Tap the bookmark icon on any resource to save it here.</div></div>';return}
  grid.innerHTML=bm.map(function(r,i){
    return'<div class="res-card" style="animation-delay:'+(i*0.04)+'s">'
      +'<div class="res-top"><div class="res-name">'+esc(r.name)+'</div><span class="res-cat cat-'+esc(r.category)+'">'+(CAT_LABEL[r.category]||esc(r.category))+'</span></div>'
      +'<div class="res-loc">'+IC.pin+' '+esc(r.location)+'</div>'
      +'<div class="res-desc">'+esc(r.description)+'</div>'
      +'<div class="res-footer"><div class="res-helpful">'+IC.thumb+' '+(r.helpful||0)+' helpful</div>'
      +'<div class="res-actions"><button class="res-action-btn voted" onclick="toggleBookmark(\''+esc(r._id)+'\');renderBookmarks()">'+IC.bm+'</button></div></div></div>';
  }).join('');
}

/* SIDEBAR NAV */
document.querySelectorAll('.sidebar-item').forEach(function(item){
  item.addEventListener('click',function(){
    var view=this.dataset.view,cat=this.dataset.cat;
    closeSidebar();
    if(view==='resources'){
      S.activeCat=cat||'all';
      document.getElementById('viewTitle').textContent=TITLE_MAP[S.activeCat]||'Resources';
      document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.toggle('active',c.dataset.cat===S.activeCat)});
      applyFilters();
    }
    showView(view);
  });
});

/* SEARCH / SORT / CHIPS */
var searchTimeout;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(searchTimeout);var q=this.value;
  renderAutocomplete(buildSuggestions(q));
  searchTimeout=setTimeout(function(){S.search=q;applyFilters()},220);
});
document.getElementById('sortSelect').addEventListener('change',function(){S.sort=this.value;applyFilters()});
document.querySelectorAll('.filter-chip').forEach(function(chip){
  chip.addEventListener('click',function(){
    document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.remove('active')});
    this.classList.add('active');S.activeCat=this.dataset.cat;
    document.querySelectorAll('.sidebar-item').forEach(function(el){el.classList.toggle('active',el.dataset.view==='resources'&&el.dataset.cat===S.activeCat)});
    document.getElementById('viewTitle').textContent=TITLE_MAP[S.activeCat]||'Resources';
    applyFilters();
  });
});

/* AUTOCOMPLETE */
var acIndex=-1;
var CAT_ICONS={food:'#ic-food',shelter:'#ic-shelter',health:'#ic-health',mental:'#ic-mental',job:'#ic-job',education:'#ic-education',legal:'#ic-legal',other:'#ic-other'};
var CAT_FULL=[{label:'Food Assistance',cat:'food'},{label:'Shelter',cat:'shelter'},{label:'Healthcare',cat:'health'},{label:'Mental Health',cat:'mental'},{label:'Job Training',cat:'job'},{label:'Education',cat:'education'},{label:'Legal Aid',cat:'legal'},{label:'Other',cat:'other'}];

function buildSuggestions(q){
  if(!q||q.length<2)return[];
  var lower=q.toLowerCase(),suggestions=[],seen={};
  CAT_FULL.forEach(function(c){if(c.label.toLowerCase().includes(lower)||c.cat.includes(lower))suggestions.push({type:'category',icon:CAT_ICONS[c.cat]||'#ic-grid',label:c.label,value:c.cat})});
  S.resources.forEach(function(r){if(r.name&&r.name.toLowerCase().includes(lower)&&!seen[r.name]){seen[r.name]=true;suggestions.push({type:'resource',icon:'#ic-pin',label:r.name,value:r.name,id:r._id})}});
  var locs={};
  S.resources.forEach(function(r){if(r.location&&r.location.toLowerCase().includes(lower)&&!locs[r.location]){locs[r.location]=true;suggestions.push({type:'location',icon:'#ic-nearme',label:r.location,value:r.location})}});
  return suggestions.slice(0,7);
}

function renderAutocomplete(suggestions){
  var drop=document.getElementById('acDropdown');
  if(!suggestions.length){drop.classList.remove('open');return}
  drop.innerHTML=suggestions.map(function(s,i){
    var typeLabel=s.type==='category'?'Category':s.type==='location'?'Location':'Resource';
    return'<div class="ac-item" data-idx="'+i+'" data-type="'+s.type+'" data-value="'+esc(s.value)+'"'+(s.id?' data-id="'+s.id+'"':'')+'>'
      +'<span class="ac-icon"><svg width="14" height="14" fill="none" stroke="#888" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><use href="'+s.icon+'"/></svg></span>'
      +'<span class="ac-label">'+esc(s.label)+'</span>'
      +'<span class="ac-type">'+typeLabel+'</span>'
      +'</div>';
  }).join('');
  acIndex=-1;drop.classList.add('open');
  drop.querySelectorAll('.ac-item').forEach(function(item){item.addEventListener('mousedown',function(e){e.preventDefault();selectSuggestion(this)})});
}

function selectSuggestion(el){
  var type=el.dataset.type,value=el.dataset.value,id=el.dataset.id;
  document.getElementById('acDropdown').classList.remove('open');
  if(type==='category'){document.getElementById('searchInput').value='';S.search='';S.activeCat=value;document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.toggle('active',c.dataset.cat===value)});applyFilters()}
  else if(type==='resource'&&id){window.location.href='resource.html?id='+id}
  else{document.getElementById('searchInput').value=value;S.search=value;applyFilters()}
}

document.getElementById('searchInput').addEventListener('keydown',function(e){
  var items=document.querySelectorAll('#acDropdown .ac-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acIndex=Math.min(acIndex+1,items.length-1);items.forEach(function(el,i){el.classList.toggle('focused',i===acIndex)})}
  else if(e.key==='ArrowUp'){e.preventDefault();acIndex=Math.max(acIndex-1,-1);items.forEach(function(el,i){el.classList.toggle('focused',i===acIndex)})}
  else if(e.key==='Enter'&&acIndex>=0){e.preventDefault();selectSuggestion(items[acIndex])}
  else if(e.key==='Escape'){document.getElementById('acDropdown').classList.remove('open')}
});
document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap'))document.getElementById('acDropdown').classList.remove('open')});

/* NEAR ME */
var nearMeActive=false;
document.getElementById('nearMeBtn').addEventListener('click',function(){
  var btn=this,label=document.getElementById('nearMeLabel');
  if(nearMeActive){nearMeActive=false;S.nearMe=false;btn.classList.remove('active');label.textContent='Near Me';applyFilters();return}
  if(!navigator.geolocation){toast('Geolocation not supported','error');return}
  btn.classList.add('loading');label.textContent='Locating...';
  navigator.geolocation.getCurrentPosition(
    function(pos){
      fetch('https://nominatim.openstreetmap.org/reverse?lat='+pos.coords.latitude+'&lon='+pos.coords.longitude+'&format=json')
        .then(function(r){return r.json()})
        .then(function(data){
          var addr=data.address||{};
          var city=addr.city||addr.town||addr.village||addr.county||addr.state||null;
          if(!city){btn.classList.remove('loading');label.textContent='Near Me';toast('Could not detect your city','error');return}
          nearMeActive=true;S.nearMe=city;btn.classList.remove('loading');btn.classList.add('active');label.textContent=city;
          applyFilters();toast('Showing resources near '+city,'success');
        })
        .catch(function(){btn.classList.remove('loading');label.textContent='Near Me';toast('Could not get location info','error')});
    },
    function(err){
      btn.classList.remove('loading');label.textContent='Near Me';
      if(err.code===1)toast('Location permission denied','info');else toast('Could not get your location','error');
    },
    {timeout:8000}
  );
});

/* INIT */
initAuth();loadResources();showView('resources');

/* THEME */
(function(){
  var btn=document.getElementById('themeToggle');
  var icon=document.getElementById('themeIcon');
  var isLight=localStorage.getItem('ch_theme')==='light';
  function applyTheme(light){
    document.body.classList.toggle('light',light);
    icon.innerHTML='<use href="'+(light?'#ic-moon':'#ic-sun')+'"/>';
    btn.title=light?'Switch to dark mode':'Switch to light mode';
  }
  applyTheme(isLight);
  btn.addEventListener('click',function(){isLight=!isLight;localStorage.setItem('ch_theme',isLight?'light':'dark');applyTheme(isLight)});
})();
</script>
